<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Quiz Calcio 1vs1</title>
<style>
  :root{
    --bg:#121212;
    --blue:#00e5ff;
    --green:#39ff8f;
    --red:#ff4757;
    --text:#f4f6f5;
    --muted:#8a9290;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overscroll-behavior:none;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',Roboto,system-ui,sans-serif;
    height:100vh;height:100dvh;width:100vw;
    overflow:hidden;
    position:fixed;
    inset:0;
  }
  .glow-bg{
    position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(0,229,255,0.16) 0%, transparent 45%),
      radial-gradient(circle at 90% 100%, rgba(57,255,143,0.14) 0%, transparent 45%),
      var(--bg);
    pointer-events:none;
  }
  .screen{
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    height:100%;width:100%;
    padding:max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
  }
  .screen.hide{display:none;}
  header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .logo{
    display:flex;align-items:center;gap:8px;font-weight:900;letter-spacing:0.5px;font-size:15px;
    background:linear-gradient(90deg, var(--blue), var(--green));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .ball{font-size:18px;-webkit-text-fill-color:initial;}
  .progress{
    font-size:13px;color:var(--muted);font-weight:700;
    background:rgba(255,255,255,0.06);padding:5px 12px;border-radius:99px;
  }

  /* ---------- MENU SCREEN ---------- */
  #menuScreen{justify-content:center;align-items:center;text-align:center;}
  .menu-box{width:100%;max-width:340px;}
  .menu-title{
    font-size:15px;letter-spacing:3px;text-transform:uppercase;
    color:var(--muted);margin:0 0 6px;font-weight:700;
  }
  .menu-headline{
    font-size:clamp(24px,7vw,30px);font-weight:900;margin:0 0 30px;
    background:linear-gradient(90deg, var(--blue), var(--green));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .field{width:100%;margin-bottom:14px;text-align:left;}
  .field label{
    display:block;font-size:12px;color:var(--muted);font-weight:700;
    text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;
  }
  .field input{
    width:100%;padding:15px 16px;border-radius:14px;
    border:1.5px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.05);color:var(--text);
    font-size:16px;font-weight:600;outline:none;
    transition:border-color 0.2s;
  }
  .field input:focus{border-color:var(--blue);}
  .field input::placeholder{color:#5f6663;}
  .btn-row{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .btn{
    width:100%;padding:17px;border-radius:16px;border:none;
    font-weight:900;font-size:16px;cursor:pointer;letter-spacing:0.3px;
    transition:transform 0.12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{
    background:linear-gradient(135deg, var(--blue), var(--green));
    color:#0a0a0a;box-shadow:0 10px 30px rgba(0,229,255,0.25);
  }
  .btn-secondary{
    background:rgba(255,255,255,0.06);
    color:var(--text);
    border:1.5px solid rgba(255,255,255,0.15);
  }
  .menu-msg{
    margin-top:16px;font-size:13px;color:var(--red);min-height:18px;font-weight:600;
  }

  /* ---------- WAITING SCREEN ---------- */
  #waitingScreen{justify-content:center;align-items:center;text-align:center;}
  .room-code-box{
    background:rgba(255,255,255,0.05);
    border:1.5px dashed rgba(0,229,255,0.4);
    border-radius:16px;
    padding:18px 24px;
    margin:18px 0 26px;
  }
  .room-code-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700;}
  .room-code-value{font-size:38px;font-weight:900;letter-spacing:6px;color:var(--blue);}
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid rgba(255,255,255,0.12);
    border-top-color:var(--green);
    animation:spin 0.9s linear infinite;
    margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .waiting-text{font-size:15px;color:var(--muted);font-weight:600;}

  /* ---------- QUIZ SCREEN ---------- */
  .players-bar{
    display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;flex-shrink:0;
  }
  .player-chip{
    flex:1;background:rgba(255,255,255,0.05);
    border:1.5px solid rgba(255,255,255,0.1);
    border-radius:14px;padding:10px 12px;
    display:flex;flex-direction:column;gap:2px;
  }
  .player-chip.me{border-color:rgba(0,229,255,0.4);}
  .player-chip.opp{border-color:rgba(57,255,143,0.4);}
  .player-chip .pname{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-chip .pscore{font-size:20px;font-weight:900;}
  .player-chip.me .pscore{color:var(--blue);}
  .player-chip.opp .pscore{color:var(--green);}
  .player-chip .pstatus{font-size:11px;color:var(--muted);margin-top:2px;}

  .timer-track{
    width:100%;height:8px;background:rgba(255,255,255,0.08);
    border-radius:99px;overflow:hidden;margin:10px 0 14px;flex-shrink:0;
  }
  .timer-fill{
    height:100%;width:100%;
    background:linear-gradient(90deg, var(--blue), var(--green));
    border-radius:99px;transition:width 1s linear, background 0.3s;
  }
  .timer-fill.danger{background:linear-gradient(90deg, var(--red), #ff8a7a);}
  .question-area{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}
  .question{font-size:clamp(19px, 5.6vw, 26px);font-weight:800;line-height:1.35;margin-bottom:18px;}
  .options{display:flex;flex-direction:column;gap:12px;flex-shrink:0;padding-bottom:6px;}
  .opt{
    background:rgba(255,255,255,0.05);
    border:1.5px solid rgba(255,255,255,0.12);
    color:var(--text);
    padding:18px 18px;
    border-radius:16px;
    font-size:clamp(15px, 4.2vw, 17px);
    font-weight:600;
    text-align:left;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.2s, border-color 0.2s, box-shadow 0.2s;
    min-height:58px;
    display:flex;
    align-items:center;
  }
  .opt:active{transform:scale(0.97);}
  .opt:disabled{cursor:default;}
  .opt.correct{
    background:rgba(57,255,143,0.18);border-color:var(--green);color:#c9ffe1;
    box-shadow:0 0 18px rgba(57,255,143,0.35);
  }
  .opt.wrong{
    background:rgba(255,71,87,0.18);border-color:var(--red);color:#ffd3d6;
    box-shadow:0 0 18px rgba(255,71,87,0.3);
  }
  .footer-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:14px;font-size:13px;color:var(--muted);flex-shrink:0;
  }
  .fade-card{animation:fadeIn 0.45s ease;}
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(14px) scale(0.985);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .fade-out{animation:fadeOut 0.25s ease forwards;}
  @keyframes fadeOut{
    from{opacity:1;transform:translateY(0);}
    to{opacity:0;transform:translateY(-10px);}
  }

  /* ---------- RESULT SCREEN ---------- */
  .gameover{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;animation:fadeIn 0.5s ease;
  }
  .gameover h1{
    font-size:13px;letter-spacing:3px;text-transform:uppercase;
    color:var(--muted);margin:0 0 8px;font-weight:700;
  }
  .vs-row{display:flex;align-items:center;gap:14px;margin:10px 0 8px;}
  .vs-score{font-size:46px;font-weight:900;line-height:1;}
  .vs-score.me{color:var(--blue);}
  .vs-score.opp{color:var(--green);}
  .vs-sep{font-size:16px;color:var(--muted);font-weight:700;}
  .vs-names{display:flex;justify-content:space-between;width:100%;max-width:260px;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:18px;}
  .final-sub{font-size:16px;font-weight:800;margin-bottom:28px;}
  .final-sub.win{color:var(--green);}
  .final-sub.lose{color:var(--red);}
  .final-sub.draw{color:var(--blue);}
  .medal{font-size:54px;margin-bottom:8px;}
  .replay-btn{
    width:100%;max-width:320px;padding:18px;border-radius:18px;border:none;
    background:linear-gradient(135deg, var(--blue), var(--green));
    color:#0a0a0a;font-weight:900;font-size:17px;cursor:pointer;
    box-shadow:0 10px 30px rgba(0,229,255,0.25);letter-spacing:0.3px;
  }
  .replay-btn:active{transform:scale(0.97);}
</style>
</head>

<div class="glow-bg"></div>

<!-- ============ MENU ============ -->
<div class="screen" id="menuScreen">
  <div class="menu-box">
    <div class="menu-title">⚽ Quiz Calcio</div>
    <div class="menu-headline">1 vs 1 Multiplayer</div>

    <div class="field">
      <label for="nameInput">Nome Giocatore</label>
      <input type="text" id="nameInput" placeholder="Es. Marco" maxlength="14">
    </div>

    <div class="field">
      <label for="roomInput">Codice Stanza (per unirti)</label>
      <input type="text" id="roomInput" placeholder="Es. A1B2" maxlength="4" style="text-transform:uppercase;">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="createBtn">Crea Stanza</button>
      <button class="btn btn-secondary" id="joinBtn">Unisciti alla Stanza</button>
    </div>

    <div class="menu-msg" id="menuMsg"></div>
  </div>
</div>

<!-- ============ WAITING ROOM ============ -->
<div class="screen hide" id="waitingScreen">
  <header>
    <div class="logo"><span class="ball">⚽</span> QUIZ CALCIO</div>
  </header>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
    <div class="room-code-box">
      <div class="room-code-label">Codice Stanza</div>
      <div class="room-code-value" id="roomCodeDisplay">----</div>
    </div>
    <div class="spinner"></div>
    <div class="waiting-text" id="waitingText">In attesa di un avversario...</div>
  </div>
</div>

<!-- ============ QUIZ ============ -->
<div class="screen hide" id="quizScreen">
  <header>
    <div class="logo"><span class="ball">⚽</span> QUIZ CALCIO</div>
    <div class="progress" id="progress">1 / 10</div>
  </header>

  <div class="players-bar">
    <div class="player-chip me">
      <div class="pname" id="meName">Tu</div>
      <div class="pscore" id="meScore">0</div>
      <div class="pstatus" id="meStatus">&nbsp;</div>
    </div>
    <div class="player-chip opp">
      <div class="pname" id="oppName">Avversario</div>
      <div class="pscore" id="oppScore">0</div>
      <div class="pstatus" id="oppStatus">&nbsp;</div>
    </div>
  </div>

  <div class="timer-track">
    <div class="timer-fill" id="timerFill"></div>
  </div>

  <div class="question-area" id="cardArea">
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsList"></div>
  </div>

  <div class="footer-row">
    <span id="timerLabel">10s</span>
    <span id="roomLabel">Stanza: ----</span>
  </div>
</div>

<!-- ============ RESULT ============ -->
<div class="screen hide" id="gameOverScreen">
  <div class="gameover">
    <div class="medal" id="medal">🏆</div>
    <h1>Partita Finita</h1>
    <div class="vs-row">
      <div class="vs-score me" id="finalMeScore">0</div>
      <div class="vs-sep">–</div>
      <div class="vs-score opp" id="finalOppScore">0</div>
    </div>
    <div class="vs-names">
      <span id="finalMeName">Tu</span>
      <span id="finalOppName">Avversario</span>
    </div>
    <div class="final-sub" id="finalSub">Risultato finale</div>
    <button class="replay-btn" id="replayBtn">Nuova Partita</button>
  </div>
</div>

// Restituisce un array di N indici casuali senza ripetizioni
function pickRandomQuestions(n){
  const pool = quizDatabase.map((_, i) => i);
  for(let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, n);
}

function generateRoomCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<4;i++){
    code += chars[Math.floor(Math.random()*chars.length)];
  }
  return code;
}

// ============================================
// CREAZIONE / INGRESSO IN STANZA
// ============================================
createBtn.addEventListener('click', async () => {
  const name = nameInput.value.trim();
  if(!name){
    menuMsg.textContent = "Inserisci il tuo nome.";
    return;
  }
  menuMsg.textContent = "";
  createBtn.disabled = true;
  joinBtn.disabled = true;
  playerName = name;

  try{
    let code, exists = true, attempts = 0;
    do{
      code = generateRoomCode();
      const snap = await db.ref('rooms/' + code).get();
      exists = snap.exists();
      attempts++;
    } while(exists && attempts < 8);

    roomCode = code;
    isHost = true;

    await db.ref('rooms/' + roomCode).set({
      status: 'waiting',
      hostId: playerId,
      currentIndex: 0,
      questionIndices: pickRandomQuestions(QUESTIONS_PER_MATCH),
      questionStartedAt: null,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      players: {
        [playerId]: {
          name: playerName,
          score: 0,
          joinedAt: firebase.database.ServerValue.TIMESTAMP
        }
      }
    });

    setupDisconnectCleanup();
    roomCodeDisplay.textContent = roomCode;
    roomLabel.textContent = "Stanza: " + roomCode;
    waitingText.textContent = "In attesa di un avversario...";
    showScreen(waitingScreen);
    listenToRoom();
  } catch(err){
    menuMsg.textContent = "Errore di connessione a Firebase. Riprova.";
    console.error(err);
  } finally{
    createBtn.disabled = false;
    joinBtn.disabled = false;
  }
});

joinBtn.addEventListener('click', async () => {
  const name = nameInput.value.trim();
  const code = roomInput.value.trim().toUpperCase();
  if(!name){
    menuMsg.textContent = "Inserisci il tuo nome.";
    return;
  }
  if(!code || code.length !== 4){
    menuMsg.textContent = "Inserisci un codice stanza valido (4 caratteri).";
    return;
  }
  menuMsg.textContent = "";
  createBtn.disabled = true;
  joinBtn.disabled = true;
  playerName = name;

  try{
    const roomSnapRef = db.ref('rooms/' + code);
    const snap = await roomSnapRef.get();

    if(!snap.exists()){
      menuMsg.textContent = "Stanza non trovata. Controlla il codice.";
      return;
    }

    const roomData = snap.val();
    const players = roomData.players || {};
    const playerIds = Object.keys(players);

    if(players[playerId]){
      // sto già rientrando nella stessa stanza (es. refresh)
    } else if(playerIds.length >= 2){
      menuMsg.textContent = "Stanza piena. Prova con un'altra.";
      return;
    }

    roomCode = code;
    isHost = (roomData.hostId === playerId);

    await db.ref('rooms/' + roomCode + '/players/' + playerId).set({
      name: playerName,
      score: 0,
      joinedAt: firebase.database.ServerValue.TIMESTAMP
    });

    setupDisconnectCleanup();
    roomLabel.textContent = "Stanza: " + roomCode;
    listenToRoom();

    // Se la partita è già iniziata, entro direttamente nel quiz informando il giocatore
    if(roomData.status === 'playing'){
      waitingText.textContent = "Partita in corso, ti sto sincronizzando...";
    }

    if(roomData.status === 'finished'){
      menuMsg.textContent = "Questa partita è già terminata.";
    }

    showScreen(waitingScreen);
    roomCodeDisplay.textContent = roomCode;
  } catch(err){
    menuMsg.textContent = "Errore di connessione a Firebase. Riprova.";
    console.error(err);
  } finally{
    createBtn.disabled = false;
    joinBtn.disabled = false;
  }
});

function setupDisconnectCleanup(){
  if(connectionListenerSet) return;
  connectionListenerSet = true;
  const myPlayerRef = db.ref('rooms/' + roomCode + '/players/' + playerId);
  myPlayerRef.onDisconnect().update({ connected: false });
}

// ============================================
// ASCOLTO STATO STANZA (REALTIME)
// ============================================
function listenToRoom(){
  if(roomListener) roomRef.off('value', roomListener);
  roomRef = db.ref('rooms/' + roomCode);
  roomListener = roomRef.on('value', (snap) => {
    const data = snap.val();
    if(!data) return;
    handleRoomUpdate(data);
  });
}

function handleRoomUpdate(data){
  const players = data.players || {};
  const playerIds = Object.keys(players).sort(); // ordine stabile
  const me = players[playerId];
  const oppId = playerIds.find(id => id !== playerId);
  const opp = oppId ? players[oppId] : null;

  // Sincronizza sempre gli indici domande dal database Firebase
  if(data.questionIndices){
    questionIndices = data.questionIndices;
  }

  // --- Avvio automatico quando ci sono 2 giocatori e siamo in attesa ---
  if(isHost && data.status === 'waiting' && playerIds.length === 2){
    db.ref('rooms/' + roomCode).update({
      status: 'playing',
      currentIndex: 0,
      questionStartedAt: firebase.database.ServerValue.TIMESTAMP
    });
    return; // arriverà un nuovo evento subito dopo
  }

  if(data.status === 'waiting'){
    waitingText.textContent = "In attesa di un avversario...";
    showScreen(waitingScreen);
    return;
  }

  if(data.status === 'playing'){
    renderQuizState(data, me, opp, oppId);
    return;
  }

  if(data.status === 'finished'){
    clearInterval(countdownInterval);
    renderGameOver(me, opp);
    return;
  }
}

// ============================================
// RENDER QUIZ (sincronizzato)
// ============================================
function renderQuizState(data, me, opp, oppId){
  showScreen(quizScreen);

  meName.textContent = me ? me.name : 'Tu';
  meScore.textContent = me ? (me.score || 0) : 0;
  oppName.textContent = opp ? opp.name : 'In attesa...';
  oppScore.textContent = opp ? (opp.score || 0) : 0;

  const idx = data.currentIndex || 0;            // posizione nella partita (0-4)
  const total = questionIndices.length || QUESTIONS_PER_MATCH;
  progress.textContent = (idx + 1) + " / " + total;

  const myAnswerForThis = me && me.answers ? me.answers[idx] : null;
  const oppAnswerForThis = opp && opp.answers ? opp.answers[idx] : null;

  meStatus.textContent = myAnswerForThis ? '✓ Risposto' : 'In attesa...';
  oppStatus.textContent = oppAnswerForThis ? '✓ Risposto' : (opp ? 'Sta pensando...' : '');

  // nuova domanda -> reset UI locale e timer
  if(idx !== lastRenderedIndex){
    lastRenderedIndex = idx;
    myAnswered = !!myAnswerForThis;
    loadQuestionUI(idx, myAnswerForThis);
  } else if(myAnswerForThis && !myAnswered){
    myAnswered = true;
    revealLocalAnswer(idx, myAnswerForThis.selected);
  }

  startSyncedTimer(data.questionStartedAt, idx, me, opp);

  // L'host monitora l'avanzamento della partita
  if(isHost){
    checkAdvanceCondition(data, idx, me, opp);
  }
}

function loadQuestionUI(idx, myAnswerForThis){
  // idx = posizione nella partita (0-4)
  // dbIdx = indice reale nel quizDatabase
  const dbIdx = questionIndices[idx] !== undefined ? questionIndices[idx] : idx;
  const q = quizDatabase[dbIdx];

  cardArea.classList.remove('fade-card');
  void cardArea.offsetWidth;

  questionText.textContent = q.q;
  optionsList.innerHTML = "";

  q.options.forEach((opt, oIdx) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(idx, oIdx));
    optionsList.appendChild(btn);
  });

  cardArea.classList.add('fade-card');

  if(myAnswerForThis){
    revealLocalAnswer(idx, myAnswerForThis.selected);
  }
}

function selectAnswer(idx, selectedIdx){
  if(myAnswered) return;
  myAnswered = true;
  const dbIdx = questionIndices[idx] !== undefined ? questionIndices[idx] : idx;
  const q = quizDatabase[dbIdx];
  const isCorrect = selectedIdx === q.correct;

  revealLocalAnswer(idx, selectedIdx);

  const updates = {};
  updates['rooms/' + roomCode + '/players/' + playerId + '/answers/' + idx] = {
    selected: selectedIdx,
    correct: isCorrect,
    answeredAt: firebase.database.ServerValue.TIMESTAMP
  };
  db.ref().update(updates);

  if(isCorrect){
    db.ref('rooms/' + roomCode + '/players/' + playerId + '/score').transaction(s => (s || 0) + 1);
  }
}

function revealLocalAnswer(idx, selectedIdx){
  const dbIdx = questionIndices[idx] !== undefined ? questionIndices[idx] : idx;
  const q = quizDatabase[dbIdx];
  const buttons = optionsList.querySelectorAll('.opt');
  buttons.forEach((btn, oIdx) => {
    btn.disabled = true;
    if(oIdx === q.correct){
      btn.classList.add('correct');
    } else if(oIdx === selectedIdx){
      btn.classList.add('wrong');
    }
  });
}

// ============================================
// TIMER SINCRONIZZATO (basato su timestamp server)
// ============================================
function startSyncedTimer(questionStartedAt, idx, me, opp){
  clearInterval(countdownInterval);
  if(!questionStartedAt) return;

  function tick(){
    const elapsed = Math.floor((Date.now() - questionStartedAt) / 1000);
    const remaining = Math.max(QUESTION_TIME - elapsed, 0);
    timerLabel.textContent = remaining + "s";
    const pct = (remaining / QUESTION_TIME) * 100;
    timerFill.style.transition = 'width 0.3s linear, background 0.3s';
    timerFill.style.width = pct + "%";
    timerFill.classList.toggle('danger', remaining <= 3);

    if(remaining <= 0){
      clearInterval(countdownInterval);
      // se il tempo scade e non ho ancora risposto, segno come "nessuna risposta"
      if(!myAnswered){
        myAnswered = true;
        revealLocalAnswer(idx, -1);
        db.ref('rooms/' + roomCode + '/players/' + playerId + '/answers/' + idx).set({
          selected: -1,
          correct: false,
          answeredAt: firebase.database.ServerValue.TIMESTAMP
        });
      }
    }
  }

  tick();
  countdownInterval = setInterval(tick, 300);
}

// ============================================
// LOGICA HOST: avanzamento domanda / fine partita
// ============================================
let advancing = false;
function checkAdvanceCondition(data, idx, me, opp){
  if(advancing) return;
  const players = data.players || {};
  const ids = Object.keys(players);
  if(ids.length < 2) return; // l'avversario non c'è ancora (rientro dopo disconnessione)

  const bothAnswered = ids.every(id => players[id].answers && players[id].answers[idx] !== undefined);
  const elapsed = data.questionStartedAt ? (Date.now() - data.questionStartedAt) / 1000 : 0;
  const timeUp = elapsed >= QUESTION_TIME + 0.4;

  if(bothAnswered || timeUp){
    advancing = true;
    setTimeout(() => advanceQuestion(idx), bothAnswered ? 1000 : 200);
  }
}

function advanceQuestion(currentIdx){
  const nextIdx = currentIdx + 1;
  const matchLength = questionIndices.length || QUESTIONS_PER_MATCH;
  if(nextIdx >= matchLength){
    db.ref('rooms/' + roomCode).update({ status: 'finished' }).then(() => {
      advancing = false;
    });
  } else {
    db.ref('rooms/' + roomCode).update({
      currentIndex: nextIdx,
      questionStartedAt: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
      advancing = false;
    });
  }
}

// ============================================
// SCHERMATA FINALE
// ============================================
function renderGameOver(me, opp){
  showScreen(gameOverScreen);
  const myScore = me ? (me.score || 0) : 0;
  const oppScoreVal = opp ? (opp.score || 0) : 0;

  finalMeScore.textContent = myScore;
  finalOppScore.textContent = oppScoreVal;
  finalMeName.textContent = (me ? me.name : 'Tu');
  finalOppName.textContent = (opp ? opp.name : 'Avversario');

  if(myScore > oppScoreVal){
    medal.textContent = "🏆";
    finalSub.textContent = "Hai vinto!";
    finalSub.className = "final-sub win";
  } else if(myScore < oppScoreVal){
    medal.textContent = "😔";
    finalSub.textContent = "Hai perso. Rivincita?";
    finalSub.className = "final-sub lose";
  } else {
    medal.textContent = "🤝";
    finalSub.textContent = "Pareggio!";
    finalSub.className = "final-sub draw";
  }
}

replayBtn.addEventListener('click', () => {
  // ripulisco lo stato locale e torno al menu per creare/unirsi a una nuova stanza
  if(roomListener && roomRef) roomRef.off('value', roomListener);
  clearInterval(countdownInterval);
  roomCode = null;
  isHost = false;
  lastRenderedIndex = -1;
  myAnswered = false;
  advancing = false;
  connectionListenerSet = false;
  questionIndices = [];
  menuMsg.textContent = "";
  roomInput.value = "";
  showScreen(menuScreen);
});
</script>
