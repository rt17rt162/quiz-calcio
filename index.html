<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Quiz Calcio</title>
<style>
  :root{
    --bg:#121212;
    --blue:#00e5ff;
    --green:#39ff8f;
    --red:#ff4757;
    --text:#f4f6f5;
    --muted:#8a9290;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overscroll-behavior:none;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',Roboto,system-ui,sans-serif;
    height:100vh;height:100dvh;width:100vw;
    overflow:hidden;
    position:fixed;
    inset:0;
  }
  .glow-bg{
    position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(0,229,255,0.16) 0%, transparent 45%),
      radial-gradient(circle at 90% 100%, rgba(57,255,143,0.14) 0%, transparent 45%),
      var(--bg);
    pointer-events:none;
  }
  .screen{
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    height:100%;width:100%;
    padding:max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
  }
  .screen.hide{display:none;}
  header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .logo{
    display:flex;align-items:center;gap:8px;font-weight:900;letter-spacing:0.5px;font-size:15px;
    background:linear-gradient(90deg, var(--blue), var(--green));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .ball{font-size:18px;-webkit-text-fill-color:initial;}
  .progress{
    font-size:13px;color:var(--muted);font-weight:700;
    background:rgba(255,255,255,0.06);padding:5px 12px;border-radius:99px;
  }
  .timer-track{
    width:100%;height:8px;background:rgba(255,255,255,0.08);
    border-radius:99px;overflow:hidden;margin:16px 0 14px;flex-shrink:0;
  }
  .timer-fill{
    height:100%;width:100%;
    background:linear-gradient(90deg, var(--blue), var(--green));
    border-radius:99px;transition:width 1s linear, background 0.3s;
  }
  .timer-fill.danger{background:linear-gradient(90deg, var(--red), #ff8a7a);}
  .question-area{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}
  .question{font-size:clamp(20px, 6vw, 28px);font-weight:800;line-height:1.35;margin-bottom:20px;}
  .options{display:flex;flex-direction:column;gap:12px;flex-shrink:0;padding-bottom:6px;}
  .opt{
    background:rgba(255,255,255,0.05);
    border:1.5px solid rgba(255,255,255,0.12);
    color:var(--text);
    padding:18px 18px;
    border-radius:16px;
    font-size:clamp(15px, 4.2vw, 17px);
    font-weight:600;
    text-align:left;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.2s, border-color 0.2s, box-shadow 0.2s;
    min-height:58px;
    display:flex;
    align-items:center;
  }
  .opt:active{transform:scale(0.97);}
  .opt:disabled{cursor:default;}
  .opt.correct{
    background:rgba(57,255,143,0.18);border-color:var(--green);color:#c9ffe1;
    box-shadow:0 0 18px rgba(57,255,143,0.35);
  }
  .opt.wrong{
    background:rgba(255,71,87,0.18);border-color:var(--red);color:#ffd3d6;
    box-shadow:0 0 18px rgba(255,71,87,0.3);
  }
  .footer-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:14px;font-size:13px;color:var(--muted);flex-shrink:0;
  }
  .score-pill{
    background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.35);
    color:var(--blue);padding:5px 12px;border-radius:99px;font-weight:800;
  }
  .fade-card{animation:fadeIn 0.45s ease;}
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(14px) scale(0.985);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .fade-out{animation:fadeOut 0.25s ease forwards;}
  @keyframes fadeOut{
    from{opacity:1;transform:translateY(0);}
    to{opacity:0;transform:translateY(-10px);}
  }
  .gameover{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;animation:fadeIn 0.5s ease;
  }
  .gameover h1{
    font-size:13px;letter-spacing:3px;text-transform:uppercase;
    color:var(--muted);margin:0 0 8px;font-weight:700;
  }
  .final-score{
    font-size:64px;font-weight:900;
    background:linear-gradient(90deg, var(--blue), var(--green));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin:4px 0 4px;line-height:1;
  }
  .final-sub{font-size:15px;color:var(--muted);margin-bottom:28px;max-width:280px;}
  .medal{font-size:54px;margin-bottom:8px;}
  .replay-btn{
    width:100%;max-width:320px;padding:18px;border-radius:18px;border:none;
    background:linear-gradient(135deg, var(--blue), var(--green));
    color:#0a0a0a;font-weight:900;font-size:17px;cursor:pointer;
    box-shadow:0 10px 30px rgba(0,229,255,0.25);letter-spacing:0.3px;
  }
  .replay-btn:active{transform:scale(0.97);}
</style>
</head>
<body>
<div class="glow-bg"></div>

<div class="screen" id="quizScreen">
  <header>
    <div class="logo"><span class="ball">⚽</span> QUIZ CALCIO</div>
    <div class="progress" id="progress">1 / 5</div>
  </header>

  <div class="timer-track">
    <div class="timer-fill" id="timerFill"></div>
  </div>

  <div class="question-area" id="cardArea">
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsList"></div>
  </div>

  <div class="footer-row">
    <span id="timerLabel">10s</span>
    <span class="score-pill" id="scorePill">Punti: 0</span>
  </div>
</div>

<div class="screen hide" id="gameOverScreen">
  <div class="gameover">
    <div class="medal" id="medal">🏆</div>
    <h1>Game Over</h1>
    <div class="final-score" id="finalScore">0/5</div>
    <div class="final-sub" id="finalSub">Risultato finale</div>
    <button class="replay-btn" id="replayBtn">Rigioca</button>
  </div>
</div>

<script>
// ============================================
// DATABASE DOMANDE — aggiungi qui nuove domande
// nello stesso formato: { q, options[4], correct }
// "correct" è l'indice (0-3) della risposta esatta
// ============================================
const quizDatabase = [
  {
    q: "Quale squadra ha vinto più Scudetti nella storia della Serie A?",
    options: ["Juventus", "Inter", "Milan", "Roma"],
    correct: 0
  },
  {
    q: "Chi ha vinto il Pallone d'Oro nel 2023?",
    options: ["Kylian Mbappé", "Erling Haaland", "Lionel Messi", "Karim Benzema"],
    correct: 2
  },
  {
    q: "Quale nazionale ha vinto i Mondiali di Qatar 2022?",
    options: ["Francia", "Brasile", "Croazia", "Argentina"],
    correct: 3
  },
  {
    q: "In quale città ha sede storicamente il club del Real Madrid?",
    options: ["Barcellona", "Madrid", "Siviglia", "Valencia"],
    correct: 1
  },
  {
    q: "Quanti giocatori di movimento (esclusi i portieri) compongono una squadra di calcio in campo?",
    options: ["9", "10", "11", "12"],
    correct: 1
  },
  {
    q: "Chi è il giocatore con più gol nella storia della Champions League?",
    options: ["Lionel Messi", "Robert Lewandowski", "Cristiano Ronaldo", "Karim Benzema"],
    correct: 2
  },
  {
    q: "In quale stadio gioca le partite casalinghe il Milan?",
    options: ["Stadio Olimpico", "San Siro", "Allianz Stadium", "Stadio Diego Armando Maradona"],
    correct: 1
  },
  {
    q: "Quale paese ha vinto più Campionati del Mondo di calcio?",
    options: ["Germania", "Italia", "Argentina", "Brasile"],
    correct: 3
  },
  {
    q: "Chi ha allenato l'Italia campione d'Europa nel 2021?",
    options: ["Antonio Conte", "Roberto Mancini", "Cesare Prandelli", "Carlo Ancelotti"],
    correct: 1
  },
  {
    q: "Quale club inglese è soprannominato 'I Reds'?",
    options: ["Manchester United", "Arsenal", "Liverpool", "Chelsea"],
    correct: 2
  }
];

let current = 0;
let score = 0;
let timeLeft = 10;
let timerInterval = null;
let answered = false;

const quizScreen = document.getElementById('quizScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const cardArea = document.getElementById('cardArea');
const questionText = document.getElementById('questionText');
const optionsList = document.getElementById('optionsList');
const progress = document.getElementById('progress');
const scorePill = document.getElementById('scorePill');
const timerFill = document.getElementById('timerFill');
const timerLabel = document.getElementById('timerLabel');
const finalScore = document.getElementById('finalScore');
const finalSub = document.getElementById('finalSub');
const medal = document.getElementById('medal');
const replayBtn = document.getElementById('replayBtn');

function startGame(){
  current = 0;
  score = 0;
  quizScreen.classList.remove('hide');
  gameOverScreen.classList.add('hide');
  loadQuestion();
}

function loadQuestion(){
  answered = false;
  timeLeft = 10;
  const data = quizDatabase[current];

  cardArea.classList.remove('fade-card');
  void cardArea.offsetWidth;

  questionText.textContent = data.q;
  progress.textContent = (current+1) + " / " + quizDatabase.length;
  scorePill.textContent = "Punti: " + score;

  optionsList.innerHTML = "";
  data.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(idx));
    optionsList.appendChild(btn);
  });

  cardArea.classList.add('fade-card');

  timerFill.style.transition = 'none';
  timerFill.style.width = '100%';
  timerFill.classList.remove('danger');
  void timerFill.offsetWidth;
  timerFill.style.transition = 'width 1s linear, background 0.3s';
  timerLabel.textContent = timeLeft + "s";

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timerLabel.textContent = Math.max(timeLeft,0) + "s";
    const pct = Math.max(timeLeft,0) / 10 * 100;
    timerFill.style.width = pct + "%";
    if(timeLeft <= 3){
      timerFill.classList.add('danger');
    }
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      if(!answered){
        revealAnswer(-1);
      }
    }
  }, 1000);
}

function selectAnswer(idx){
  if(answered) return;
  clearInterval(timerInterval);
  revealAnswer(idx);
}

function revealAnswer(selectedIdx){
  answered = true;
  const data = quizDatabase[current];
  const buttons = optionsList.querySelectorAll('.opt');
  buttons.forEach((btn, idx) => {
    btn.disabled = true;
    if(idx === data.correct){
      btn.classList.add('correct');
    } else if(idx === selectedIdx){
      btn.classList.add('wrong');
    }
  });

  if(selectedIdx === data.correct){
    score++;
    scorePill.textContent = "Punti: " + score;
  }

  setTimeout(() => {
    cardArea.classList.add('fade-out');
    setTimeout(() => {
      cardArea.classList.remove('fade-out');
      current++;
      if(current < quizDatabase.length){
        loadQuestion();
      } else {
        endGame();
      }
    }, 220);
  }, 1000);
}

function endGame(){
  quizScreen.classList.add('hide');
  gameOverScreen.classList.remove('hide');
  finalScore.textContent = score + "/" + quizDatabase.length;

  let msg, ic;
  if(score === quizDatabase.length){
    msg = "Perfetto! Sei un vero esperto di calcio.";
    ic = "🏆";
  } else if(score >= 3){
    msg = "Ottimo risultato, conosci bene il pallone!";
    ic = "🥈";
  } else if(score >= 1){
    msg = "Non male, ma puoi fare di meglio.";
    ic = "⚽";
  } else {
    msg = "Riprova: il calcio ti aspetta!";
    ic = "🔄";
  }
  finalSub.textContent = msg;
  medal.textContent = ic;
}

replayBtn.addEventListener('click', startGame);

startGame();
</script>
</body>
</html>
